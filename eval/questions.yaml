# M1 eval set over httpx==0.27.2 (see docs/eval-set-httpx.md).
# `anchors` are dotted qualified-name suffixes; a question is a hit if ANY anchor
# node appears in the retriever's top-k. Confirmed against the pinned corpus.
- id: 1

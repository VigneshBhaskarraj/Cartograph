<!DOCTYPE html>
<!-- Generated by Cartograph (`cartograph viz`). Fully self-contained: the graph
     data is embedded below and the page makes zero network requests. -->
<html lang="en">
<head>
<meta charset="utf-8">
<!-- In-page enforcement of the zero-egress promise: nothing may load or connect. -->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:;">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__CARTOGRAPH_TITLE__ — Cartograph</title>
<style>
  :root { --bg:#0b0e14; --panel:#131822ee; --line:#232b3a; --fg:#d6deeb; --dim:#8492a8; --acc:#4ea1ff; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--fg);
               font:13px/1.45 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow:hidden; }
  #c { position:absolute; inset:0; cursor:grab; }
  #c.dragging { cursor:grabbing; }
  .panel { position:absolute; background:var(--panel); border:1px solid var(--line);
           border-radius:10px; padding:10px 12px; backdrop-filter: blur(6px); }
  #hud { top:12px; left:12px; width:270px; max-height:calc(100% - 24px); overflow:auto; }
  #hud h1 { font-size:15px; margin:0 0 2px; }
  #hud .sub { color:var(--dim); font-size:11px; margin-bottom:8px; }
  #search { width:100%; padding:6px 8px; border-radius:6px; border:1px solid var(--line);
            background:#0e1320; color:var(--fg); outline:none; }
  #results div { padding:4px 6px; border-radius:5px; cursor:pointer; color:var(--dim);
                 white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #results div:hover { background:#1b2230; color:var(--fg); }
  .row { display:flex; gap:6px; align-items:center; margin:7px 0 3px; flex-wrap:wrap; }
  button { background:#1b2230; color:var(--fg); border:1px solid var(--line); border-radius:6px;
           padding:4px 9px; cursor:pointer; font-size:12px; }
  button:hover { border-color:var(--acc); }
  button.on { background:var(--acc); color:#06121f; border-color:var(--acc); }
  #detail { bottom:12px; left:12px; width:340px; max-height:42%; overflow:auto; display:none; }
  #detail .kind { display:inline-block; padding:1px 7px; border-radius:9px; font-size:11px; color:#06121f; }
  #detail .qn { font-weight:600; margin:5px 0 2px; word-break:break-all; }
  #detail .meta { color:var(--dim); font-size:11px; }
  #detail .sig { font-family:ui-monospace, Menlo, monospace; font-size:11px; color:#a8c7ff;
                 margin:6px 0; white-space:pre-wrap; word-break:break-all; }
  #detail .doc { color:var(--dim); font-size:12px; white-space:pre-wrap; }
  #legend { bottom:12px; right:12px; font-size:11px; max-width:230px; }
  #legend .li { display:flex; align-items:center; gap:6px; margin:2px 0; color:var(--dim); }
  #legend .sw { width:10px; height:10px; border-radius:3px; flex:none; }
  #legend .lw { width:16px; height:3px; border-radius:2px; flex:none; }
  #filters { top:12px; right:12px; width:215px; max-height:calc(100% - 24px); overflow:auto; }
  #filters h3 { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); margin:8px 0 3px; }
  #filters label { display:flex; gap:6px; align-items:center; cursor:pointer; padding:1px 0; color:var(--fg); }
  #filters .cnt { color:var(--dim); margin-left:auto; }
  #tip { position:absolute; pointer-events:none; background:#0e1320; border:1px solid var(--line);
         padding:3px 8px; border-radius:6px; font-size:11px; display:none; max-width:420px;
         word-break:break-all; z-index:5; }
  #status { position:absolute; top:12px; left:50%; transform:translateX(-50%); color:var(--dim);
            font-size:11px; background:var(--panel); border:1px solid var(--line);
            border-radius:8px; padding:4px 12px; display:none; }
  .hint { color:var(--dim); font-size:11px; margin-top:6px; }
  a { color:var(--acc); text-decoration:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tip"></div>
<div id="status"></div>

<div id="hud" class="panel">
  <h1>__CARTOGRAPH_TITLE__</h1>
  <div class="sub" id="counts"></div>
  <input id="search" placeholder="search symbols…  (e.g. Client.send)" autocomplete="off">
  <div id="results"></div>
  <div class="row">
    <button id="mode3d" class="on">3D</button><button id="mode2d">2D</button>
    <button id="spin">⟳ spin</button>
    <button id="overview">overview</button>
    <button id="png">⤓ PNG</button>
  </div>
  <div class="row">
    <span style="color:var(--dim)">focus hops</span>
    <button class="hop" data-h="1">1</button>
    <button class="hop on" data-h="2">2</button>
    <button class="hop" data-h="3">3</button>
  </div>
  <div class="hint">drag rotate · wheel zoom · shift-drag pan · click a node ·
    esc = overview · generated offline by
    <a href="https://github.com/VigneshBhaskarraj/Cartograph">Cartograph</a></div>
</div>

<div id="filters" class="panel"></div>
<div id="detail" class="panel"></div>
<div id="legend" class="panel"></div>

<script id="data" type="application/json">__CARTOGRAPH_DATA__</script>
<script>
"use strict";
const DATA = JSON.parse(document.getElementById("data").textContent);
const N = DATA.nodes, L = DATA.links;
const EMBED = new URLSearchParams(location.search).get("embed") === "1";

const KIND_COLORS = { module:"#4ea1ff", class:"#ffb454", function:"#7ad97a", method:"#3fd0c9",
  table:"#d98ee0", column:"#9d7df0", rationale:"#f2e85c", interface:"#ff8aa1", external:"#5b6573" };
const EDGE_COLORS = { CALLS:"#ff5c5c", CONTAINS:"#33415c", IMPORTS:"#5c8aff", INHERITS:"#ffd25c",
  DOCUMENTS:"#c9bd45", REFERENCES:"#d98ee0", MAPS_TO:"#ff8af0", QUERIES:"#6fe8c0", JOINS:"#b6e85c" };
const kc = k => KIND_COLORS[k] || "#9aa5b5";
const ec = y => EDGE_COLORS[y] || "#556";

// ---- state ------------------------------------------------------------------
const st = {
  mode: "3d", yaw: 0.6, pitch: 0.25, zoom: 2.4, panX: 0, panY: 0, spin: false,
  hops: 2, focus: null, selected: -1, hovered: -1, pathFrom: -1,
  kinds: new Set(Object.keys(N.reduce((a, n) => (a[n.kind] = 1, a), {}))),
  types: new Set(L.map(l => l.y)),
  showInferred: true,
};
st.kinds.delete("external"); // contentless stubs are noise by default — re-enable in filters

// ---- adjacency (rebuilt when filters change) ---------------------------------
let adj = [];
function rebuildAdj() {
  adj = N.map(() => []);
  for (let i = 0; i < L.length; i++) {
    const l = L[i];
    if (!st.types.has(l.y)) continue;
    if (!st.showInferred && l.c === "INFERRED") continue;
    adj[l.s].push({ n: l.t, l: i }); adj[l.t].push({ n: l.s, l: i });
  }
}
function nodeVisible(i) {
  if (!st.kinds.has(N[i].kind)) return false;
  if (st.focus && !st.focus.has(i)) return false;
  return true;
}
function linkVisible(l) {
  if (!st.types.has(l.y)) return false;
  if (!st.showInferred && l.c === "INFERRED") return false;
  return nodeVisible(l.s) && nodeVisible(l.t);
}
function bfs(start, maxHops) {
  const seen = new Map([[start, 0]]); const q = [start];
  while (q.length) {
    const v = q.shift(); const d = seen.get(v);
    if (d >= maxHops) continue;
    for (const e of adj[v]) if (st.kinds.has(N[e.n].kind) && !seen.has(e.n)) { seen.set(e.n, d + 1); q.push(e.n); }
  }
  return seen;
}
function shortestPath(a, b) {
  const prev = new Map([[a, -1]]); const q = [a];
  while (q.length) {
    const v = q.shift();
    if (v === b) break;
    for (const e of adj[v]) if (st.kinds.has(N[e.n].kind) && !prev.has(e.n)) { prev.set(e.n, v); q.push(e.n); }
  }
  if (!prev.has(b)) return null;
  const path = []; for (let v = b; v !== -1; v = prev.get(v)) path.push(v);
  return path.reverse();
}

// ---- canvas + projection -----------------------------------------------------
const cv = document.getElementById("c"), ctx = cv.getContext("2d");
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = innerWidth; H = innerHeight;
  cv.width = W * DPR; cv.height = H * DPR; cv.style.width = W + "px"; cv.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  draw();
}
const P = new Float32Array(N.length * 3); // projected x, y, depth-scale
function project() {
  const cy = Math.cos(st.yaw), sy = Math.sin(st.yaw);
  const cp = Math.cos(st.pitch), sp = Math.sin(st.pitch);
  const D = 420;
  for (let i = 0; i < N.length; i++) {
    const n = N[i];
    let x = n.x, y = n.y, z = n.z;
    if (st.mode === "3d") {
      const x1 = x * cy + z * sy, z1 = -x * sy + z * cy;
      const y1 = y * cp - z1 * sp, z2 = y * sp + z1 * cp;
      const s = D / Math.max(60, D - z2);
      x = x1 * s; y = y1 * s; z = s;
    } else { z = 1; }
    P[i * 3] = W / 2 + st.panX + x * st.zoom;
    P[i * 3 + 1] = H / 2 + st.panY + y * st.zoom;
    P[i * 3 + 2] = z;
  }
}
function radius(i) {
  return Math.min(11, 2.2 + Math.sqrt(N[i].deg) * 0.85) * (st.mode === "3d" ? P[i * 3 + 2] : 1) * Math.min(1.6, st.zoom * 0.55);
}
let highlightLinks = null; // Set of link indices (path mode)
function draw() {
  project();
  ctx.clearRect(0, 0, W, H);
  // edges first
  for (let i = 0; i < L.length; i++) {
    const l = L[i];
    if (!linkVisible(l)) continue;
    const hl = highlightLinks && highlightLinks.has(i);
    ctx.strokeStyle = ec(l.y);
    ctx.globalAlpha = hl ? 0.95 : (l.c === "INFERRED" ? 0.16 : 0.34);
    ctx.lineWidth = hl ? 2.2 : 0.7;
    ctx.beginPath();
    ctx.moveTo(P[l.s * 3], P[l.s * 3 + 1]);
    ctx.lineTo(P[l.t * 3], P[l.t * 3 + 1]);
    ctx.stroke();
  }
  // nodes back-to-front
  const order = [];
  for (let i = 0; i < N.length; i++) if (nodeVisible(i)) order.push(i);
  if (st.mode === "3d") order.sort((a, b) => P[a * 3 + 2] - P[b * 3 + 2]);
  ctx.globalAlpha = 1;
  for (const i of order) {
    const r = radius(i);
    ctx.fillStyle = kc(N[i].kind);
    ctx.beginPath(); ctx.arc(P[i * 3], P[i * 3 + 1], r, 0, 7); ctx.fill();
    if (i === st.selected || i === st.hovered || i === st.pathFrom) {
      ctx.strokeStyle = i === st.pathFrom ? "#ff8af0" : "#ffffff";
      ctx.lineWidth = 1.6; ctx.stroke();
    }
  }
  // labels for big/selected nodes when zoomed in or focused
  if (st.zoom > 3.2 || st.focus) {
    ctx.font = "10px ui-monospace, Menlo, monospace";
    for (const i of order) {
      if (st.focus || N[i].deg > 18 || i === st.selected) {
        ctx.fillStyle = "rgba(214,222,235,.85)";
        ctx.fillText(N[i].name, P[i * 3] + radius(i) + 3, P[i * 3 + 1] + 3);
      }
    }
  }
}

// ---- picking ------------------------------------------------------------------
function pick(mx, my) {
  // Per-node hit radius (at least 12px, or the drawn body), nearest wins.
  let best = -1, bd = Infinity;
  for (let i = 0; i < N.length; i++) {
    if (!nodeVisible(i)) continue;
    const dx = P[i * 3] - mx, dy = P[i * 3 + 1] - my;
    const d = dx * dx + dy * dy, r = radius(i) + 5;
    if (d < Math.max(144, r * r) && d < bd) { best = i; bd = d; }
  }
  return best;
}

// ---- interaction ----------------------------------------------------------------
let drag = null;
cv.addEventListener("mousedown", e => { drag = { x: e.clientX, y: e.clientY, moved: false, pan: e.shiftKey || e.button === 2 }; cv.classList.add("dragging"); });
addEventListener("mouseup", e => {
  cv.classList.remove("dragging");
  if (drag && !drag.moved) clickAt(e.clientX, e.clientY);
  drag = null;
});
addEventListener("mousemove", e => {
  if (drag) {
    const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
    if (Math.abs(dx) + Math.abs(dy) > 3) drag.moved = true;
    if (drag.pan || st.mode === "2d") { st.panX += dx; st.panY += dy; }
    else { st.yaw += dx * 0.006; st.pitch = Math.max(-1.5, Math.min(1.5, st.pitch + dy * 0.006)); }
    drag.x = e.clientX; drag.y = e.clientY;
    draw();
  } else {
    const h = pick(e.clientX, e.clientY);
    if (h !== st.hovered) {
      st.hovered = h; draw();
      const tip = document.getElementById("tip");
      if (h >= 0) { tip.style.display = "block"; tip.textContent = N[h].qn;
        tip.style.left = Math.min(W - 320, e.clientX + 14) + "px"; tip.style.top = (e.clientY + 12) + "px"; }
      else tip.style.display = "none";
    }
  }
});
cv.addEventListener("wheel", e => {
  e.preventDefault();
  st.zoom = Math.max(0.4, Math.min(14, st.zoom * (e.deltaY < 0 ? 1.12 : 0.9)));
  draw();
}, { passive: false });
cv.addEventListener("contextmenu", e => e.preventDefault());
addEventListener("keydown", e => {
  if (e.key === "Escape" && e.target !== searchEl) overview();
});

function clickAt(mx, my) {
  const i = pick(mx, my);
  if (i < 0) return;
  if (st.pathFrom >= 0 && st.pathFrom !== i) { showPath(st.pathFrom, i); return; }
  select(i);
}

// ---- modes ----------------------------------------------------------------------
function select(i) {
  st.selected = i;
  renderDetail(i);
  draw();
}
function focusOn(i) {
  rebuildAdj();
  st.focus = new Set(bfs(i, st.hops).keys());
  st.selected = i;
  centerOn(i);
  status(`focused: ${N[i].qn} (${st.focus.size} nodes within ${st.hops} hops) — esc for overview`);
  renderDetail(i); draw();
}
function centerOn(i) {
  // put the node at screen centre by adjusting pan after projection
  project();
  st.panX += W / 2 - P[i * 3]; st.panY += H / 2 - P[i * 3 + 1];
}
function overview() {
  st.focus = null; highlightLinks = null; st.pathFrom = -1;
  st.panX = st.panY = 0; status("");
  draw();
}
function showPath(a, b) {
  rebuildAdj();
  const path = shortestPath(a, b);
  st.pathFrom = -1;
  if (!path) { status(`no path between ${N[a].name} and ${N[b].name} under current filters`); return; }
  st.focus = new Set(path);
  highlightLinks = new Set();
  for (let k = 0; k + 1 < path.length; k++) {
    for (const e of adj[path[k]]) if (e.n === path[k + 1]) { highlightLinks.add(e.l); break; }
  }
  st.selected = b;
  status(`path (${path.length} nodes): ${path.map(i => N[i].name).join(" → ")}`);
  renderDetail(b); draw();
}
function status(msg) {
  const el = document.getElementById("status");
  el.style.display = msg ? "block" : "none"; el.textContent = msg;
}

// ---- panels ----------------------------------------------------------------------
function renderDetail(i) {
  if (EMBED) return; // embed view stays clean — no panels on interaction either
  const n = N[i], d = document.getElementById("detail");
  d.style.display = "block";
  d.innerHTML = `
    <span class="kind" style="background:${kc(n.kind)}">${esc(n.kind)}</span>
    <div class="qn">${esc(n.qn)}</div>
    <div class="meta">${esc(n.file)}:${n.line} · degree ${n.deg}</div>
    ${n.sig ? `<div class="sig">${esc(n.sig)}</div>` : ""}
    ${n.doc ? `<div class="doc">${esc(n.doc)}</div>` : ""}
    <div class="row">
      <button id="bFocus">focus</button>
      <button id="bPath">path from here…</button>
      <button id="bClear">clear</button>
    </div>`;
  d.querySelector("#bFocus").onclick = () => focusOn(i);
  d.querySelector("#bPath").onclick = () => { st.pathFrom = i; status(`path mode: now click the destination node`); draw(); };
  d.querySelector("#bClear").onclick = () => { d.style.display = "none"; st.selected = -1; draw(); };
}
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

const searchEl = document.getElementById("search"), resultsEl = document.getElementById("results");
searchEl.addEventListener("input", () => {
  const q = searchEl.value.toLowerCase().trim();
  resultsEl.innerHTML = "";
  if (q.length < 2) return;
  let hits = 0;
  for (let i = 0; i < N.length && hits < 14; i++) {
    if (!st.kinds.has(N[i].kind)) continue;
    if (N[i].qn.toLowerCase().includes(q)) {
      const div = document.createElement("div");
      div.textContent = `[${N[i].kind}] ${N[i].qn}`;
      div.onclick = () => { focusOn(i); resultsEl.innerHTML = ""; searchEl.value = N[i].qn; };
      resultsEl.appendChild(div); hits++;
    }
  }
});

function buildFilters() {
  const f = document.getElementById("filters");
  const kinds = {}, types = {};
  N.forEach(n => kinds[n.kind] = (kinds[n.kind] || 0) + 1);
  L.forEach(l => types[l.y] = (types[l.y] || 0) + 1);
  let html = "<h3>node kinds</h3>";
  for (const k of Object.keys(kinds).sort()) {
    html += `<label><input type="checkbox" data-kind="${esc(k)}" ${st.kinds.has(k) ? "checked" : ""}>
      <span class="sw" style="background:${kc(k)};display:inline-block;width:9px;height:9px;border-radius:3px"></span>
      ${esc(k)}<span class="cnt">${kinds[k]}</span></label>`;
  }
  html += "<h3>edge types</h3>";
  for (const y of Object.keys(types).sort()) {
    html += `<label><input type="checkbox" data-type="${esc(y)}" checked>
      <span class="lw" style="background:${ec(y)};display:inline-block;width:14px;height:3px;border-radius:2px"></span>
      ${esc(y)}<span class="cnt">${types[y]}</span></label>`;
  }
  html += `<h3>confidence</h3>
    <label><input type="checkbox" id="inf" checked> show INFERRED edges</label>`;
  f.innerHTML = html;
  f.querySelectorAll("[data-kind]").forEach(cb => cb.onchange = () => {
    cb.checked ? st.kinds.add(cb.dataset.kind) : st.kinds.delete(cb.dataset.kind); draw();
  });
  f.querySelectorAll("[data-type]").forEach(cb => cb.onchange = () => {
    cb.checked ? st.types.add(cb.dataset.type) : st.types.delete(cb.dataset.type); draw();
  });
  f.querySelector("#inf").onchange = e => { st.showInferred = e.target.checked; draw(); };
}
function buildLegend() {
  const el = document.getElementById("legend");
  const kinds = [...new Set(N.map(n => n.kind))].sort();
  const types = [...new Set(L.map(l => l.y))].sort();
  el.innerHTML = kinds.map(k => `<div class="li"><span class="sw" style="background:${kc(k)}"></span>${esc(k)}</div>`).join("")
    + `<div style="height:5px"></div>`
    + types.map(y => `<div class="li"><span class="lw" style="background:${ec(y)}"></span>${esc(y)}</div>`).join("")
    + `<div class="li" style="margin-top:4px">faint = INFERRED, solid = EXTRACTED</div>`;
}

// ---- toolbar ----------------------------------------------------------------------
document.getElementById("mode3d").onclick = () => setMode("3d");
document.getElementById("mode2d").onclick = () => setMode("2d");
function setMode(m) {
  st.mode = m;
  document.getElementById("mode3d").classList.toggle("on", m === "3d");
  document.getElementById("mode2d").classList.toggle("on", m === "2d");
  draw();
}
document.getElementById("spin").onclick = function () {
  st.spin = !st.spin; this.classList.toggle("on", st.spin);
};
document.getElementById("overview").onclick = overview;
document.getElementById("png").onclick = () => {
  const a = document.createElement("a");
  a.download = "cartograph.png"; a.href = cv.toDataURL("image/png"); a.click();
};
document.querySelectorAll(".hop").forEach(b => b.onclick = () => {
  document.querySelectorAll(".hop").forEach(x => x.classList.remove("on"));
  b.classList.add("on"); st.hops = +b.dataset.h;
  if (st.selected >= 0 && st.focus) focusOn(st.selected);
});

// ---- boot -------------------------------------------------------------------------
document.getElementById("counts").textContent =
  `${N.length} symbols · ${L.length} relationships`;
if (EMBED) ["hud", "filters", "detail", "legend"].forEach(id => document.getElementById(id).style.display = "none");
buildFilters(); buildLegend(); rebuildAdj();
addEventListener("resize", resize);
resize();
(function tick() { if (st.spin && !drag) { st.yaw += 0.004; draw(); } requestAnimationFrame(tick); })();
</script>
</body>
</html>
